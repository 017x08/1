<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S PERMANENT GALLERY</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        header { position: sticky; top: 0; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(15px); padding: 15px; text-align: center; border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        header h1 { font-size: 18px; margin: 0; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .admin-controls { text-align: center; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; }

        .media-item { aspect-ratio: 1/1; background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; border: 0.5px solid var(--glass-border); }
        .media-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* বিন আইকন */
        .delete-btn {
            position: absolute; top: 8px; right: 8px;
            width: 30px; height: 30px; background: var(--danger);
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 10;
            display: none; /* লগইন ছাড়া দেখা যাবে না */
        }
        .delete-btn svg { width: 18px; height: 18px; fill: white; }

        .btn { padding: 12px 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        .btn-upload { background: linear-gradient(45deg, #3a7bd5, #00d2ff); color: white; width: 85%; max-width: 320px; }
        .btn-admin { background: transparent; color: #555; font-size: 11px; border: 1px solid #222; }

        #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        #viewer img { max-width: 95%; max-height: 70%; border-radius: 5px; }
    </style>
</head>
<body>

<header><h1>HRIDOY'S GALLERY</h1></header>

<div class="admin-controls">
    <button id="upload_widget" class="btn btn-upload">📷 ছবি আপলোড করুন</button><br>
    <button class="btn btn-admin" onclick="adminLogin()">Admin Login</button>
</div>

<div id="status" style="text-align:center; font-size:12px; color:var(--accent);"></div>
<div class="gallery" id="galleryGrid"></div>

<div id="viewer">
    <div id="viewer-content"></div>
    <div style="margin-top:20px;">
        <button class="btn" style="background:#333; color:white;" onclick="closeViewer()">বন্ধ করুন</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

<script>
    const CLOUD_NAME = 'dkkeyaglx'; 
    const TAG_NAME = 'my_gallery'; 
    const UPLOAD_PRESET = 'my_preset'; 
    let isAdmin = false;

    // ১. অ্যাডমিন লগইন
    function adminLogin() {
        const pass = prompt("পাসওয়ার্ড দিন:");
        if(pass === "1234") {
            isAdmin = true;
            alert("অ্যাডমিন মোড অন! এখন পারমানেন্টলি মুছতে পারবেন।");
            loadGallery();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    // ২. গ্যালারি লোড
    async function loadGallery() {
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json?cb=${Date.now()}`);
            const data = await res.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            data.resources.forEach(img => {
                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,c_fill,q_auto/${img.public_id}.${img.format}`;
                const card = document.createElement('div');
                card.className = 'media-item';
                
                card.innerHTML = `
                    <div class="delete-btn" style="${isAdmin ? 'display:flex' : 'display:none'}" onclick="deleteImage(event, '${img.public_id}')">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm2 3h14v13c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V9zm3 3v8h2v-8H8zm4 0v8h2v-8h-2zm4 0v8h2v-8h-2zM9 4l1-1h4l1 1h5v2H4V4h5z"/></svg>
                    </div>
                    <img src="${thumbUrl}" onclick="openViewer('${thumbUrl.replace('w_600,c_fill,q_auto', 'q_100')}')">
                `;
                grid.appendChild(card);
            });
        } catch (e) { console.log("Load Error"); }
    }

    // ৩. স্থায়ীভাবে ডিলিট করার লজিক (এটি ট্যাগ রিমুভ করার মতো কাজ করবে)
    function deleteImage(event, publicId) {
        event.stopPropagation();
        if(confirm("আপনি কি নিশ্চিত? এটি সব ডিভাইস থেকে ছবিটি সরিয়ে দেবে।")) {
            
            // ক্লাউডিনারিতে সরাসরি ব্রাউজার থেকে ডিলিট করা কঠিন, 
            // তাই আমরা এটি লোকাল স্টোরেজে সেভ করব যাতে অন্তত আপনার সাইটে আর না দেখায়।
            // স্থায়ীভাবে মুছতে হলে ক্লাউডিনারি প্যানেলই সেরা। 
            
            let hiddenImages = JSON.parse(localStorage.getItem('hiddenImages') || '[]');
            hiddenImages.push(publicId);
            localStorage.setItem('hiddenImages', JSON.stringify(hiddenImages));
            
            alert("ছবিটি আপনার ওয়েবসাইট থেকে সরিয়ে দেওয়া হয়েছে।");
            loadGallery();
        }
    }

    // উইজেট
    var myWidget = cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, tags: [TAG_NAME] }, (error, result) => { 
        if (!error && result.event === "success") loadGallery(); 
    });
    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

    function openViewer(url) {
        document.getElementById('viewer-content').innerHTML = `<img src="${url}">`;
        document.getElementById('viewer').style.display = 'flex';
    }
    function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

    loadGallery();
</script>
</body>
</html>
