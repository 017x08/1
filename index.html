<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Cloud Gallery</title>
    <style>
        :root {
            --tg-theme: #2481cc;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #0e1621; /* Telegram Desktop Dark Color */
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* App-like Header */
        .app-bar {
            width: 100%;
            padding: 15px 20px;
            background: rgba(23, 33, 43, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }

        .app-bar h1 { font-size: 20px; margin: 0; color: var(--tg-theme); }

        /* Login Section */
        #login-container {
            margin-top: 100px;
            text-align: center;
            padding: 40px;
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        /* Gallery Grid (Phone Gallery Style) */
        .gallery-container {
            display: none; /* লগইনের পর এটি ব্লক হবে */
            width: 100%;
            max-width: 800px;
            padding: 10px;
            box-sizing: border-box;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .media-item {
            aspect-ratio: 1/1;
            background: #17212b;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .media-item img, .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Horizontal App-style Navigation (As you requested before) */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            background: rgba(23, 33, 43, 0.9);
            padding: 10px 25px;
            border-radius: 30px;
            display: flex;
            gap: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }

        .nav-item { color: #808b99; text-decoration: none; font-size: 14px; }
        .nav-item.active { color: var(--tg-theme); font-weight: bold; }

    </style>
</head>
<body>

    <div class="app-bar">
        <h1>TG Cloud</h1>
        <div id="user-info"></div>
    </div>

    <div id="login-container">
        <img src="https://telegram.org/img/t_logo.png" width="60" alt="TG">
        <h2>Welcome to Your Cloud</h2>
        <p>আপনার টেলিগ্রাম ফাইলগুলো দেখতে লগইন করুন</p>
        
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="YOUR_BOT_USERNAME" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <div class="gallery-container" id="gallery-container">
        <div class="gallery-grid" id="media-grid">
            </div>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active">Photos</a>
        <a href="#" class="nav-item">Videos</a>
        <a href="#" class="nav-item">Settings</a>
    </div>

    <script>
        function onTelegramAuth(user) {
            console.log('Logged in as: ' + user.first_name);
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('gallery-container').style.display = 'block';
            document.getElementById('user-info').innerText = user.first_name;
            
            loadTelegramMedia(user.id);
        }

        async function loadTelegramMedia(userId) {
            // আপনার বোট বা ডাটাবেস থেকে ফাইল লিস্ট নিয়ে আসার কোড এখানে হবে
            // আপাতত স্যাম্পল ডাটা দিয়ে দেখানো হলো
            const grid = document.getElementById('media-grid');
            
            // স্যাম্পল ডেটা (আপনার বোট এই ডাটাবেসটি মেইনটেইন করবে)
            const sampleFiles = [
                { type: 'image', url: 'https://via.placeholder.com/300' },
                { type: 'image', url: 'https://via.placeholder.com/301' },
                { type: 'image', url: 'https://via.placeholder.com/302' }
            ];

            sampleFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = 'media-item';
                div.innerHTML = `<img src="${file.url}" alt="TG Media">`;
                grid.appendChild(div);
            });
        }
    </script>
</body>
</html>
