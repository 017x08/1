<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Private Cloud</title>
    <style>
        :root { --accent: #2481cc; --bg: #0e1621; --card: rgba(23, 33, 43, 0.8); }
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }

        /* Glassmorphism Header */
        header {
            position: sticky; top: 0; background: rgba(23, 33, 43, 0.9);
            backdrop-filter: blur(15px); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }

        /* Login Screen */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Gallery Grid */
        .cloud-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px;
        }

        .media-item {
            aspect-ratio: 1/1; background: #17212b; position: relative;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Nav */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 40px; display: flex; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 200;
        }

        .nav-link { color: #808b99; text-decoration: none; font-size: 14px; padding: 8px 15px; border-radius: 20px; }
        .nav-link.active { background: var(--accent); color: white; font-weight: bold; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: 90px; right: 25px; width: 60px; height: 60px;
            background: var(--accent); border-radius: 50%; border: none;
            color: white; font-size: 30px; cursor: pointer; z-index: 200;
            box-shadow: 0 10px 20px rgba(36, 129, 204, 0.3);
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <img src="https://telegram.org/img/t_logo.png" width="60" alt="">
            <h2>TG Private Cloud</h2>
            <p style="color: #808b99;">আপনার টেলিগ্রাম দিয়ে লগইন করুন</p>
            <div id="tg-login-button"></div>
        </div>
    </div>

    <header>
        <h1 style="font-size: 20px; margin: 0;">My Cloud</h1>
        <div id="user-name" style="font-size: 14px; color: var(--accent);"></div>
    </header>

    <div class="cloud-grid" id="media-container">
        </div>

    <input type="file" id="file-selector" style="display: none;" onchange="uploadToTG(this.files)">

    <button class="fab" onclick="document.getElementById('file-selector').click()">+</button>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="render('all')">All</div>
        <div class="nav-link" onclick="render('photo')">Photos</div>
        <div class="nav-link" onclick="render('video')">Videos</div>
    </div>

    <script>
        // --- আপনার তথ্য এখানে দিন ---
        const BOT_TOKEN = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
        const BOT_USERNAME = 'YOUR_BOT_USERNAME'; // বোট ফাদার থেকে পাওয়া ইউজারনেম
        const CHAT_ID = '8782276212'; 
        // -------------------------

        // টেলিগ্রাম লগইন উইজেট লোড করা
        const loginBtn = document.createElement('script');
        loginBtn.src = "https://telegram.org/js/telegram-widget.js?22";
        loginBtn.setAttribute('data-telegram-login', BOT_USERNAME);
        loginBtn.setAttribute('data-size', 'large');
        loginBtn.setAttribute('data-onauth', 'onTelegramAuth(user)');
        document.getElementById('tg-login-button').appendChild(loginBtn);

        function onTelegramAuth(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('user-name').innerText = user.first_name;
            fetchCloudData();
        }

        // ক্লাউড থেকে ডাটা আনা (Bot Updates)
        async function fetchCloudData() {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
            const data = await res.json();
            const grid = document.getElementById('media-container');
            grid.innerHTML = '';

            data.result.reverse().forEach(async (item) => {
                const msg = item.message;
                if (!msg) return;

                let fileId = null;
                if (msg.photo) fileId = msg.photo[msg.photo.length - 1].file_id;
                if (msg.video) fileId = msg.video.file_id;

                if (fileId) {
                    const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                    const fileData = await fileRes.json();
                    const url = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;

                    const div = document.createElement('div');
                    div.className = 'media-item';
                    if (msg.photo) div.innerHTML = `<img src="${url}">`;
                    else div.innerHTML = `<video src="${url}" onclick="this.play()"></video>`;
                    grid.appendChild(div);
                }
            });
        }

        // ওয়েবসাইট থেকে সরাসরি আপলোড
        async function uploadToTG(files) {
            const file = files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            const type = file.type.startsWith('video') ? 'sendVideo' : 'sendPhoto';
            formData.append(file.type.startsWith('video') ? 'video' : 'photo', file);

            alert("টেলিগ্রাম ক্লাউডে আপলোড হচ্ছে...");
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${type}`, {
                method: 'POST',
                body: formData
            });
            alert("সফল! ২ মিনিট পর রিফ্রেশ করুন।");
            fetchCloudData();
        }
    </script>
</body>
</html>
