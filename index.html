<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Cloud Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #2481cc; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header */
        .header { 
            position: sticky; top: 0; background: rgba(23, 33, 43, 0.9); 
            backdrop-filter: blur(15px); padding: 15px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }

        /* Phone Style Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .media-box {
            aspect-ratio: 1/1;
            background: #17212b;
            position: relative;
            overflow: hidden;
        }

        .media-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Nav */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(23, 33, 43, 0.8); backdrop-filter: blur(20px);
            padding: 10px 30px; border-radius: 30px; display: flex; gap: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item { color: #808b99; text-decoration: none; font-size: 12px; }
        .active { color: var(--accent); font-weight: bold; }

        #login-overlay {
            position: fixed; inset: 0; background: #0e1621; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>TG Cloud Login</h2>
        <div id="tg-login"></div>
    </div>

    <div class="header">
        <h1 style="font-size: 18px; margin: 0;">Saved Media</h1>
    </div>

    <div class="gallery" id="mediaGallery">
        </div>

    <div class="nav">
        <a href="#" class="nav-item active">Photos</a>
        <a href="#" class="nav-item">Files</a>
        <a href="#" class="nav-item">Settings</a>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DB_URL"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Telegram Auth
        window.onTelegramAuth = function(user) {
            document.getElementById('login-overlay').style.display = 'none';
            loadGallery(user.id);
        };

        function loadGallery(userId) {
            db.ref('users/' + userId + '/files').on('value', (snapshot) => {
                const gallery = document.getElementById('mediaGallery');
                gallery.innerHTML = '';
                snapshot.forEach((child) => {
                    const data = child.val();
                    const div = document.createElement('div');
                    div.className = 'media-box';
                    div.innerHTML = `<img src="${data.url}" onclick="window.open('${data.url}')">`;
                    gallery.appendChild(div);
                });
            });
        }

        // লগইন উইজেট রেন্ডার
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', "YOUR_BOT_USERNAME");
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        document.getElementById('tg-login').appendChild(script);
    </script>
</body>
</html>
