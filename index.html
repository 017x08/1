<script>
    const CLOUD_NAME = 'dkkeyaglx'; 
    const TAG_NAME = 'my_gallery'; 

    async function loadImages() {
        try {
            // এই লিঙ্কটি সরাসরি ব্রাউজারে চেক করে দেখতে পারেন ডেটা আসে কি না
            const response = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json`);
            
            if (!response.ok) throw new Error("Resource List Not Allowed or Empty");

            const data = await response.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            data.resources.forEach(img => {
                // ছবির কোয়ালিটি অটোমেটিক ঠিক করা হয়েছে (f_auto, q_auto)
                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_400,c_fill,f_auto,q_auto/${img.public_id}.${img.format}`;
                const fullUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto/${img.public_id}.${img.format}`;

                const card = document.createElement('div');
                card.className = 'media-item';
                card.innerHTML = `<img src="${thumbUrl}" alt="Gallery Image" loading="lazy">`;
                card.onclick = () => openViewer(fullUrl);
                grid.appendChild(card);
            });

            document.getElementById('status').innerText = "";
        } catch (e) {
            document.getElementById('status').innerText = "ছবি লোড হচ্ছে না। সেটিংস চেক করুন।";
            console.error("Error:", e);
        }
    }

    // বাকি Viewer ফাংশনগুলো আগের মতোই থাকবে...
    loadImages();
</script>
