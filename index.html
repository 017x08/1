<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S QUICK GALLERY</title>
    <style>
        :root { --accent: #00d2ff; --bg: #05070a; --danger: #ff4757; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .btn-upload { background: var(--accent); color: #000; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .media-item { aspect-ratio: 1/1; position: relative; background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .media-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* লাল বিন বাটন */
        .del-btn {
            position: absolute; top: 5px; right: 5px;
            background: var(--danger); width: 28px; height: 28px;
            border-radius: 5px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; border: none; z-index: 10;
        }
        .del-btn svg { fill: white; width: 16px; height: 16px; }
    </style>
</head>
<body>

<header><h2>HRIDOY'S GALLERY</h2></header>

<button id="upload_widget" class="btn-upload">📷 ছবি আপলোড করুন</button>

<div id="galleryGrid" class="gallery"></div>

<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

<script>
    const CLOUD_NAME = 'dkkeyaglx'; 
    const UPLOAD_PRESET = 'my_preset'; 
    const TAG_NAME = 'my_gallery';
    
    // আপলোড হওয়া ছবির ডিলিট টোকেন রাখার জন্য একটি অবজেক্ট
    let deleteTokens = {};

    // ১. গ্যালারি লোড করা
    async function loadGallery() {
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json?cb=${Date.now()}`);
            const data = await res.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            data.resources.forEach(img => {
                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_400,c_fill,q_auto/${img.public_id}.${img.format}`;
                const card = document.createElement('div');
                card.className = 'media-item';
                
                // শুধুমাত্র সেই ছবির জন্য বিন বাটন দেখাবে যার ডিলিট টোকেন আমাদের কাছে আছে
                const canDelete = deleteTokens[img.public_id] ? 'flex' : 'none';

                card.innerHTML = `
                    <button class="del-btn" style="display: ${canDelete}" onclick="permanentDelete('${img.public_id}')">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                    <img src="${thumbUrl}">
                `;
                grid.appendChild(card);
            });
        } catch (e) { console.log("Refresh required..."); }
    }

    // ২. সরাসরি ক্লাউডিনারি থেকে ডিলিট করার ফাংশন (Permanent)
    async function permanentDelete(publicId) {
        const token = deleteTokens[publicId];
        if(!token) return;

        if(confirm("ছবিটি কি ক্লাউডিনারি থেকে চিরতরে মুছে ফেলতে চান?")) {
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/delete_by_token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                if (response.ok) {
                    alert("ছবিটি সফলভাবে Cloudinary থেকে ডিলিট হয়েছে!");
                    delete deleteTokens[publicId];
                    loadGallery();
                } else {
                    alert("১০ মিনিট পার হয়ে গেছে, এখন আর সরাসরি ডিলিট করা যাবে না।");
                }
            } catch (err) {
                alert("ডিলিট রিকোয়েস্ট ফেইল হয়েছে।");
            }
        }
    }

    // ৩. আপলোড উইজেট (এখানে ডিলিট টোকেন সংগ্রহ করা হয়)
    var myWidget = cloudinary.createUploadWidget({
        cloudName: CLOUD_NAME, 
        uploadPreset: UPLOAD_PRESET,
        tags: [TAG_NAME]
    }, (error, result) => { 
        if (!error && result && result.event === "success") {
            // ডিলিট টোকেন সেভ করে রাখা হচ্ছে
            deleteTokens[result.info.public_id] = result.info.delete_token;
            loadGallery();
        }
    });

    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

    loadGallery();
</script>
</body>
</html>
