<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Cloud Manager</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --accent: #2481cc; --bg: #000; --card: #1c1c1e; }
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding-bottom: 110px; overflow-x: hidden;
        }

        /* Glassmorphism Header */
        header {
            position: sticky; top: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); padding: 18px; text-align: center;
            border-bottom: 0.5px solid #333; z-index: 100;
        }

        /* Gallery Grid (3 Columns like Phone Gallery) */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px; min-height: 400px;
        }

        .media-card {
            aspect-ratio: 1/1; background: var(--card); position: relative;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }

        .del-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(255, 59, 48, 0.9);
            border: none; color: white; border-radius: 50%; width: 22px; height: 22px;
            font-size: 14px; cursor: pointer; z-index: 10;
        }

        /* Floating Nav Bar */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px);
            padding: 8px 15px; border-radius: 35px; display: flex; gap: 10px;
            border: 1px solid #333; z-index: 200;
        }

        .nav-item {
            color: #8e8e93; padding: 10px 18px; border-radius: 25px;
            cursor: pointer; font-size: 13px; transition: 0.3s;
        }

        .nav-item.active { background: var(--accent); color: #fff; font-weight: 600; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: 95px; right: 25px; width: 56px; height: 56px;
            background: var(--accent); border-radius: 50%; border: none;
            color: white; font-size: 28px; cursor: pointer; z-index: 200;
            box-shadow: 0 8px 20px rgba(36, 129, 204, 0.4);
        }

        /* Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .login-box {
            background: var(--card); padding: 30px; border-radius: 25px;
            text-align: center; width: 85%; max-width: 350px; border: 1px solid #333;
        }

        input {
            width: 100%; padding: 12px; margin: 20px 0; border-radius: 12px;
            border: 1px solid #444; background: #000; color: #fff; outline: none;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-box">
            <h2 style="margin-top:0;">Cloud Manager</h2>
            <p style="color:#8e8e93; font-size:14px;">আপনার পিন কোড দিন</p>
            <input type="password" id="pinCode" placeholder="Enter PIN">
            <button onclick="checkAuth()" style="width:100%; padding:12px; border-radius:12px; border:none; background:var(--accent); color:white; font-weight:bold;">Login</button>
        </div>
    </div>

    <header>
        <h1 id="tabTitle" style="font-size: 18px; margin: 0;">Photos</h1>
    </header>

    <div class="gallery-grid" id="mainGallery"></div>

    <input type="file" id="fileUpload" style="display: none;" onchange="uploadFile(this.files)">

    <button class="fab" onclick="document.getElementById('fileUpload').click()">+</button>

    <div class="nav-bar">
        <div class="nav-item active" id="btn-photo" onclick="changeTab('photo')">Photos</div>
        <div class="nav-item" id="btn-video" onclick="changeTab('video')">Videos</div>
        <div class="nav-item" id="btn-file" onclick="changeTab('file')">Files</div>
    </div>

    <script>
        // ১. Firebase Configuration (আপনার Firebase থেকে ডাটা এখানে বসান)
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DB_URL",
            storageBucket: "YOUR_FIREBASE_STORAGE_BUCKET"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let currentTab = 'photo';

        // ২. Auth Logic
        function checkAuth() {
            const pin = document.getElementById('pinCode').value;
            if(pin === "8782") { // আপনার পছন্দের পিন কোড এখানে দিন
                document.getElementById('auth-screen').style.display = 'none';
                loadGallery();
            } else {
                alert("ভুল পিন!");
            }
        }

        // ৩. Tab Switching
        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('tabTitle').innerText = tab.charAt(0).toUpperCase() + tab.slice(1) + "s";
            loadGallery();
        }

        // ৪. Load Data
        function loadGallery() {
            const grid = document.getElementById('mainGallery');
            grid.innerHTML = '';
            
            db.ref(currentTab).on('value', (snapshot) => {
                grid.innerHTML = '';
                if(!snapshot.exists()) {
                    grid.innerHTML = '<div style="grid-column:span 3; padding:100px 0; text-align:center; color:#444;">No Content</div>';
                    return;
                }
                snapshot.forEach(child => {
                    const data = child.val();
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    if(currentTab === 'photo') {
                        card.innerHTML = `<img src="${data.url}" onclick="window.open('${data.url}')">`;
                    } else if(currentTab === 'video') {
                        card.innerHTML = `<video src="${data.url}" controls></video>`;
                    } else {
                        card.innerHTML = `<div style="text-align:center; font-size:12px;">📄<br>${data.name.substring(0,10)}</div>`;
                    }

                    const del = document.createElement('button');
                    del.className = 'del-btn'; del.innerText = '×';
                    del.onclick = () => deleteMedia(child.key, data.path);
                    card.appendChild(del);
                    grid.appendChild(card);
                });
            });
        }

        // ৫. Website Upload Logic
        async function uploadFile(files) {
            const file = files[0]; if(!file) return;
            const path = `${currentTab}s/${Date.now()}_${file.name}`;
            const ref = storage.ref(path);
            alert("Uploading...");
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.ref(currentTab).push({ url: url, name: file.name, path: path });
            alert("Success!");
        }

        // ৬. Delete Logic
        async function deleteMedia(key, path) {
            if(confirm("Delete?")) {
                if(path) await storage.ref(path).delete().catch(()=>{});
                await db.ref(currentTab + '/' + key).remove();
            }
        }
    </script>
</body>
</html>
