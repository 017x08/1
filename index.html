<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Photo Manager</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        .upload-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 40px;
        }

        input[type="file"] {
            background: #334155;
            border-radius: 8px;
            padding: 8px;
            border: none;
            color: white;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background: #2563eb; transform: translateY(-2px); }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .img-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .img-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
        }

        .delete-btn {
            background: #ef4444;
            width: 100%;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <h1>Cloud Image Manager</h1>
        <p>Firebase-er maddhome chobi add ebong delete korun</p>
    </div>

    <div class="upload-box">
        <input type="file" id="photoInput">
        <button id="uploadBtn">Upload Photo</button>
    </div>

    <div class="gallery" id="imageGallery">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>

<script>
    // Apnar Firebase Config ekhane boshan
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    const db = firebase.database();

    // -- Logic: Upload Image --
    document.getElementById('uploadBtn').onclick = async () => {
        const file = document.getElementById('photoInput').files[0];
        if (!file) return alert("File select korun!");

        const storageRef = storage.ref('photos/' + file.name);
        await storageRef.put(file);
        const url = await storageRef.getDownloadURL();

        // Database e save kora
        db.ref('images').push({ url: url, name: file.name });
        alert("Upload Sesh!");
        location.reload();
    };

    // -- Logic: Load Images --
    db.ref('images').on('value', (snapshot) => {
        const gallery = document.getElementById('imageGallery');
        gallery.innerHTML = '';
        snapshot.forEach((child) => {
            const data = child.val();
            gallery.innerHTML += `
                <div class="img-card">
                    <img src="${data.url}">
                    <button class="delete-btn" onclick="deleteImg('${child.key}', '${data.name}')">Delete</button>
                </div>
            `;
        });
    });

    // -- Logic: Delete Image --
    window.deleteImg = async (key, name) => {
        if(confirm("Delete korte chan?")) {
            await storage.ref('photos/' + name).delete();
            await db.ref('images/' + key).remove();
            alert("Deleted!");
        }
    };
</script>

</body>
</html>
