<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S CLOUD GALLERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GramJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/telegram/browser/telegram.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .login-card { max-width: 400px; margin: 100px auto; padding: 2rem; border-radius: 20px; }
        .img-card { transition: 0.3s; overflow: hidden; border-radius: 15px; background: #1e293b; }
        .img-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-4">

    <!-- Login Area -->
    <div id="loginArea" class="glass login-card">
        <h2 class="text-2xl font-bold mb-4 text-center">Telegram Login</h2>
        <input type="text" id="phone" placeholder="+88017XXXXXXXX" class="w-full p-3 mb-4 rounded bg-white/10 border border-white/20 outline-none">
        <button onclick="startLogin()" id="loginBtn" class="w-full bg-cyan-500 p-3 rounded font-bold hover:bg-cyan-600 transition">Send Code</button>
        
        <div id="codeSection" class="hidden mt-4">
            <input type="text" id="code" placeholder="Enter OTP Code" class="w-full p-3 mb-4 rounded bg-white/10 border border-white/20 outline-none">
            <button onclick="submitCode()" class="w-full bg-green-500 p-3 rounded font-bold hover:bg-green-600 transition">Verify & Login</button>
        </div>
    </div>

    <!-- Gallery Area -->
    <div id="galleryArea" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 glass p-6 rounded-3xl">
            <h1 class="text-3xl font-bold">HRIDOY'S <span class="text-cyan-400">GALLERY</span></h1>
            <button onclick="localStorage.clear(); location.reload();" class="text-red-400 text-sm">Logout</button>
        </div>
        <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Photos will be injected here -->
        </div>
        <div id="loader" class="text-center mt-10 text-cyan-400 font-bold hidden">Loading images from channel...</div>
    </div>

    <script>
        const { TelegramClient } = telegram;
        const { StringSession } = telegram.sessions;

        const apiId = 35956481;
        const apiHash = "0718456773c2c6e400717d6acd68a353";
        const sessionKey = "hridoy_gallery_session";
        
        let client;
        let stringSession = new StringSession(localStorage.getItem(sessionKey) || "");

        async function init() {
            client = new TelegramClient(stringSession, apiId, apiHash, { connectionRetries: 5 });
            
            if (localStorage.getItem(sessionKey)) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('galleryArea').classList.remove('hidden');
                await client.connect();
                fetchMessages();
            }
        }

        async function startLogin() {
            const phone = document.getElementById('phone').value;
            await client.connect();
            
            window.res = await client.sendCode({ apiId, apiHash }, phone);
            document.getElementById('codeSection').classList.remove('hidden');
            document.getElementById('loginBtn').innerText = "Code Sent!";
        }

        async function submitCode() {
            const code = document.getElementById('code').value;
            const phone = document.getElementById('phone').value;
            
            try {
                await client.signIn({
                    phoneNumber: phone,
                    phoneCode: code,
                    phoneCodeHash: window.res.phoneCodeHash
                });
                
                localStorage.setItem(sessionKey, client.session.save());
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function fetchMessages() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                // আপনার চ্যানেলের ইউজারনেম এখানে দিন
                const result = await client.getMessages("HRIDOYGALL", { limit: 100 });
                const grid = document.getElementById('galleryGrid');
                
                for (const msg of result) {
                    if (msg.media && msg.media.photo) {
                        const buffer = await client.downloadMedia(msg.media, {});
                        const blob = new Blob([buffer], { type: 'image/jpeg' });
                        const url = URL.createObjectURL(blob);
                        
                        const card = document.createElement('div');
                        card.className = "img-card p-2";
                        card.innerHTML = `<img src="${url}" class="w-full h-56 object-cover rounded-xl shadow-lg">`;
                        grid.appendChild(card);
                    }
                }
            } catch (err) {
                console.error(err);
            }
            loader.classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
