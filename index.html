<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TG Cloud</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        header h1 {
            font-size: 18px;
            margin: 0;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            padding: 3px;
        }

        .media-item {
            aspect-ratio: 1/1;
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 0.5px solid var(--glass-border);
            transition: transform 0.1s;
        }
        
        .media-item:active { transform: scale(0.95); }

        .media-item img, .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .type-tag {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            color: #fff;
        }

        #status {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--accent);
            min-height: 15px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 6px 10px;
            border-radius: 30px;
            display: flex;
            gap: 5px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn {
            color: #888;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        .fab {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<header><h1>MY DIGITAL CLOUD</h1></header>

<div id="status">Syncing...</div>
<div class="gallery" id="galleryGrid"></div>

<button class="fab" onclick="document.getElementById('fileInput').click()">+</button>
<input type="file" id="fileInput" style="display: none;" onchange="uploadFile(this.files)">

<div class="bottom-nav">
    <div class="nav-btn active" id="tab-all" onclick="changeTab('all')">All</div>
    <div class="nav-btn" id="tab-photo" onclick="changeTab('photo')">Photos</div>
    <div class="nav-btn" id="tab-video" onclick="changeTab('video')">Videos</div>
</div>

<script>
    const TOKEN = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
    const CHAT_ID = '8782276212';
    
    let mediaCache = [];
    let currentTab = 'all';

    async function loadData() {
        document.getElementById('status').innerText = "Updating gallery...";
        try {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-100`);
            const data = await res.json();
            
            mediaCache = [];
            data.result.forEach(item => {
                const msg = item.message || item.channel_post;
                if (!msg) return;

                let entry = null;
                // Document hishebe pathano chobi detect korar jonno logic
                if (msg.photo) {
                    entry = { type: 'photo', fileId: msg.photo[msg.photo.length - 1].file_id };
                } else if (msg.video) {
                    entry = { type: 'video', fileId: msg.video.file_id };
                } else if (msg.document) {
                    const mime = msg.document.mime_type || "";
                    if (mime.startsWith('image/')) {
                        entry = { type: 'photo', fileId: msg.document.file_id };
                    } else if (mime.startsWith('video/')) {
                        entry = { type: 'video', fileId: msg.document.file_id };
                    }
                }

                if (entry) mediaCache.push(entry);
            });
            render();
            document.getElementById('status').innerText = "";
        } catch (e) {
            document.getElementById('status').innerText = "Sync Failed";
        }
    }

    async function render() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        const filtered = currentTab === 'all' ? mediaCache : mediaCache.filter(m => m.type === currentTab);
        
        for (let m of [...filtered].reverse()) {
            const card = document.createElement('div');
            card.className = 'media-item';
            
            try {
                const fileRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${m.fileId}`);
                const fileData = await fileRes.json();
                const url = `https://api.telegram.org/file/bot${TOKEN}/${fileData.result.file_path}`;

                if (m.type === 'photo') {
                    card.innerHTML = `<img src="${url}" onclick="window.open('${url}')">`;
                } else if (m.type === 'video') {
                    card.innerHTML = `<video src="${url}" onclick="this.play()"></video><span class="type-tag">Video</span>`;
                }
            } catch(e) {
                card.innerHTML = `<div style="font-size:8px; color:#333;">Load Error</div>`;
            }
            grid.appendChild(card);
        }
    }

    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        render();
    }

    async function uploadFile(files) {
        const file = files[0];
        if (!file) return;

        document.getElementById('status').innerText = "Uploading as Document...";
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        
        // Quality dhore rakhar jonno Document hishebe pathano
        formData.append('document', file);

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendDocument`, { method: 'POST', body: formData });
            document.getElementById('status').innerText = "Done! Syncing...";
            setTimeout(loadData, 1500); 
        } catch(e) {
            document.getElementById('status').innerText = "Error uploading";
        }
    }

    loadData();
</script>
</body>
</html>
