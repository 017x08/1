<script>
    const TOKEN = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
    
    let mediaCache = [];
    let selectedFiles = new Set();
    let isSelectionMode = false;
    let pressTimer;
    let currentTab = 'photo';
    let currentRenderId = 0; // বাগ ফিক্স করার জন্য রেন্ডার আইডি

    async function loadData() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-100`);
            const data = await res.json();
            mediaCache = [];
            
            data.result.forEach(item => {
                const msg = item.message || item.channel_post;
                if (!msg) return;
                
                let entry = null;
                if (msg.photo) {
                    entry = { type: 'photo', fileId: msg.photo[msg.photo.length - 1].file_id };
                } else if (msg.video) {
                    entry = { type: 'video', fileId: msg.video.file_id };
                } else if (msg.document) {
                    const mime = msg.document.mime_type || "";
                    if (mime.startsWith('image/')) entry = { type: 'photo', fileId: msg.document.file_id };
                    else if (mime.startsWith('video/')) entry = { type: 'video', fileId: msg.document.file_id };
                }
                
                if (entry) mediaCache.push(entry);
            });
            render();
            document.getElementById('status').innerText = "";
        } catch (e) { document.getElementById('status').innerText = "Sync Error"; }
    }

    async function render() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        
        // বর্তমান রেন্ডার আইডি বাড়িয়ে দেওয়া যাতে আগের রেন্ডার প্রসেসগুলো বাতিল হয়
        const thisRenderId = ++currentRenderId;
        
        const filtered = mediaCache.filter(m => m.type === currentTab);
        const listToDisplay = [...filtered].reverse();
        
        if(listToDisplay.length === 0) {
            grid.innerHTML = `<div style="grid-column: span 3; text-align: center; padding: 50px; color: #555;">No ${currentTab}s found</div>`;
            return;
        }

        for (let m of listToDisplay) {
            // যদি ইউজার অন্য ট্যাবে ক্লিক করে দেয়, তবে এই লুপটি এখানেই থেমে যাবে
            if (thisRenderId !== currentRenderId) return;

            try {
                const fileRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${m.fileId}`);
                const fileData = await fileRes.json();
                const url = `https://api.telegram.org/file/bot${TOKEN}/${fileData.result.file_path}`;

                const card = document.createElement('div');
                card.className = 'media-item';
                card.innerHTML = m.type === 'photo' ? `<img src="${url}">` : `<video src="${url}"></video>`;
                
                card.onmousedown = card.ontouchstart = () => { pressTimer = setTimeout(() => startSelection(card, url), 800); };
                card.onmouseup = card.ontouchend = () => clearTimeout(pressTimer);
                
                card.onclick = () => {
                    if (isSelectionMode) toggleSelect(card, url);
                    else openViewer(m.type, url);
                };

                grid.appendChild(card);
            } catch(e) { console.error("File load error"); }
        }
    }

    function changeTab(tab) {
        if(currentTab === tab) return; // একই ট্যাবে বারবার ক্লিক করলে কিছু হবে না
        currentTab = tab;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        cancelSelection(); // ট্যাব বদলালে সিলেকশন মোড বন্ধ হয়ে যাবে
        render();
    }

    function openViewer(type, url) {
        const content = document.getElementById('viewer-content');
        content.innerHTML = type === 'photo' ? `<img src="${url}">` : `<video src="${url}" controls autoplay></video>`;
        document.getElementById('dl-link').href = url;
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('viewer-content').innerHTML = ''; 
    }

    function startSelection(card, url) {
        isSelectionMode = true;
        document.getElementById('select-bar').style.display = 'flex';
        toggleSelect(card, url);
    }

    function toggleSelect(card, url) {
        if (selectedFiles.has(url)) {
            selectedFiles.delete(url);
            card.classList.remove('selected');
        } else {
            selectedFiles.add(url);
            card.classList.add('selected');
        }
        document.getElementById('select-count').innerText = `${selectedFiles.size} Selected`;
        if (selectedFiles.size === 0) cancelSelection();
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedFiles.clear();
        document.querySelectorAll('.media-item').forEach(i => i.classList.remove('selected'));
        document.getElementById('select-bar').style.display = 'none';
    }

    async function downloadSelected() {
        for (let url of selectedFiles) {
            const a = document.createElement('a');
            a.href = url;
            a.download = "cloud_file_" + Date.now();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            await new Promise(r => setTimeout(r, 800)); 
        }
        cancelSelection();
    }

    loadData();
</script>
