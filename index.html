<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S GALLERY - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }
        .header-bg {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(58, 123, 213, 0.1));
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <div class="header-bg p-10 rounded-[40px] border border-white/10 text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tight mb-2">HRIDOY'S <span class="text-cyan-400">GALLERY</span></h1>
            <p class="text-gray-400">Live Syncing from @HRIDOYGALL</p>
            
            <div class="mt-8 flex justify-center gap-4">
                <a href="https://t.me/HRIDOYGALL" target="_blank" class="bg-cyan-500/20 text-cyan-400 px-6 py-2 rounded-full border border-cyan-500/30 hover:bg-cyan-500/30 transition">
                    Open Channel
                </a>
                <button onclick="fetchGallery()" class="bg-white/10 px-6 py-2 rounded-full border border-white/20 hover:bg-white/20 transition">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Images will load here -->
            <div id="loader" class="col-span-full text-center py-10 text-gray-500">
                Loading photos from channel...
            </div>
        </div>
    </div>

    <script>
        const channelName = 'HRIDOYGALL';
        const galleryGrid = document.getElementById('galleryGrid');
        const loader = document.getElementById('loader');

        async function fetchGallery() {
            try {
                // টেলিগ্রামের পাবলিক ওয়েব ভিউ থেকে ডাটা ফেচ করা
                // নোট: সরাসরি ফেচ করলে CORS ইস্যু হতে পারে, তাই একটি প্রক্সি ব্যবহার করা হচ্ছে
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = encodeURIComponent(`https://t.me/s/${channelName}`);
                
                const response = await fetch(proxyUrl + targetUrl);
                const data = await response.json();
                const html = data.contents;

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // টেলিগ্রামের ছবির কন্টেইনার খুঁজে বের করা
                const messages = doc.querySelectorAll('.tgme_widget_message_photo_wrap');
                
                if (messages.length === 0) {
                    loader.innerHTML = "No photos found in the channel.";
                    return;
                }

                loader.remove();
                galleryGrid.innerHTML = ""; // আগের ডাটা ক্লিয়ার

                messages.forEach(msg => {
                    // স্টাইল এট্রিবিউট থেকে ছবির ব্যাকগ্রাউন্ড URL বের করা
                    const style = msg.getAttribute('style');
                    const urlMatch = style.match(/url\(['"]?([^'"]+)['"]?\)/);
                    
                    if (urlMatch) {
                        const imageUrl = urlMatch[1];
                        createCard(imageUrl);
                    }
                });

            } catch (error) {
                console.error("Error:", error);
                loader.innerHTML = "Failed to load gallery. Please check your internet.";
            }
        }

        function createCard(url) {
            const card = document.createElement('div');
            card.className = 'glass-card p-3 overflow-hidden group';
            card.innerHTML = `
                <div class="relative overflow-hidden rounded-2xl">
                    <img src="${url}" class="w-full h-64 object-cover transition duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                        <button onclick="window.open('${url}', '_blank')" class="bg-white/20 backdrop-blur-md text-white w-full py-2 rounded-xl border border-white/30 text-sm font-semibold">
                            View Full Image
                        </button>
                    </div>
                </div>
            `;
            galleryGrid.appendChild(card);
        }

        // পেজ লোড হলে ফাংশনটি চালু করা
        fetchGallery();
    </script>
</body>
</html>
