<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Cloud Manager</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --tg-blue: #2481cc; --bg: #000; --card: #1c1c1e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Header */
        header { 
            position: sticky; top: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px); padding: 15px; text-align: center;
            border-bottom: 0.5px solid #333; z-index: 100;
        }

        /* Category Grid */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px;
        }

        .media-card {
            aspect-ratio: 1/1; background: var(--card); position: relative; overflow: hidden;
        }

        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Delete Button */
        .del-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.6);
            border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
        }

        /* Horizontal Navigation Bar */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 30px; display: flex; gap: 30px;
            border: 1px solid #333; z-index: 200;
        }

        .nav-item { color: #8e8e93; text-decoration: none; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--tg-blue); font-weight: bold; }

        /* Floating Action Button */
        .fab-upload {
            position: fixed; bottom: 90px; right: 25px;
            width: 55px; height: 55px; background: var(--tg-blue);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 15px rgba(36, 129, 204, 0.4);
            cursor: pointer; border: none; z-index: 200;
        }
    </style>
</head>
<body>

<header><h1 id="viewTitle" style="font-size: 18px; margin: 0;">Photos</h1></header>

<div class="gallery-grid" id="mainGallery">
    </div>

<input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(this.files)">

<button class="fab-upload" onclick="document.getElementById('fileInput').click()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('photo', this)">Photos</div>
    <div class="nav-item" onclick="switchTab('video', this)">Videos</div>
    <div class="nav-item" onclick="switchTab('file', this)">Files</div>
</div>

<script>
    // ১. Firebase Config
    const firebaseConfig = {
        databaseURL: "YOUR_DB_URL",
        storageBucket: "YOUR_BUCKET_URL"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentTab = 'photo';

    // ২. Tab Switching Logic
    function switchTab(type, el) {
        currentTab = type;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('viewTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1) + "s";
        loadData();
    }

    // ৩. Upload from Website
    async function handleFileUpload(files) {
        const file = files[0];
        if(!file) return;
        
        const path = `${currentTab}s/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        
        alert("আপলোড শুরু হয়েছে...");
        await ref.put(file);
        const url = await ref.getDownloadURL();
        
        db.ref(currentTab).push({ url: url, name: file.name, storagePath: path });
        alert("সফলভাবে আপলোড হয়েছে!");
    }

    // ৪. Load Data from Firebase
    function loadData() {
        db.ref(currentTab).on('value', (snap) => {
            const grid = document.getElementById('mainGallery');
            grid.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                const card = document.createElement('div');
                card.className = 'media-card';
                
                if(currentTab === 'photo') {
                    card.innerHTML = `<img src="${data.url}" onclick="window.open('${data.url}')">`;
                } else if(currentTab === 'video') {
                    card.innerHTML = `<video src="${data.url}" controls></video>`;
                } else {
                    card.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:10px;padding:5px;text-align:center;">📄 ${data.name}</div>`;
                }
                
                card.innerHTML += `<button class="del-btn" onclick="deleteItem('${child.key}', '${data.storagePath}')">×</button>`;
                grid.appendChild(card);
            });
        });
    }

    // ৫. Delete Function
    async function deleteItem(key, path) {
        if(confirm("মুছে ফেলতে চান?")) {
            if(path) await storage.ref(path).delete();
            await db.ref(currentTab + '/' + key).remove();
        }
    }

    loadData(); // Initial Load
</script>
</body>
</html>
