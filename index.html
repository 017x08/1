<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hridoy's Cloud Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
        }
        .glass:hover {
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }
        .liquid-btn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }
        .liquid-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
            transform: scale(1.02);
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="glass p-10 rounded-[40px] text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-3 tracking-tight">Cloud <span class="text-cyan-400">Gallery</span></h1>
            <p class="text-gray-400 mb-8">Unlimited Storage Powered by Telegram</p>
            
            <div class="flex flex-col items-center">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <label for="fileInput" id="uploadLabel" class="liquid-btn px-10 py-4 rounded-2xl cursor-pointer font-bold text-lg inline-flex items-center gap-2">
                    <span>Upload Image</span>
                </label>
                <div id="status" class="mt-4 font-medium text-cyan-400"></div>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Images will load here -->
        </div>
    </div>

    <script>
        const botToken = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
        const chatId = '8540900103';
        const galleryGrid = document.getElementById('galleryGrid');
        const status = document.getElementById('status');

        // লোড হওয়ার সময় লোকাল ডাটা দেখানো
        window.onload = () => {
            const savedImages = JSON.parse(localStorage.getItem('hridoy_gallery') || '[]');
            savedImages.reverse().forEach(imgData => displayImage(imgData.url, imgData.messageId));
        };

        // আপলোড প্রসেস
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerHTML = "Uploading to Cloud...";
            
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', file);

            try {
                // ১. টেলিগ্রামে ছবি পাঠানো
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.ok) {
                    const messageId = data.result.message_id;
                    const fileId = data.result.photo[data.result.photo.length - 1].file_id;

                    // ২. ছবির সরাসরি লিঙ্ক তৈরি করা
                    const fileInfo = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                    const fileData = await fileInfo.json();
                    const imageUrl = `https://api.telegram.org/file/bot${botToken}/${fileData.result.file_path}`;

                    saveData(imageUrl, messageId);
                    displayImage(imageUrl, messageId, true);
                    status.innerHTML = "Upload Success!";
                    setTimeout(() => status.innerHTML = "", 3000);
                }
            } catch (error) {
                status.innerHTML = "Upload Failed!";
            }
        };

        function saveData(url, messageId) {
            const images = JSON.parse(localStorage.getItem('hridoy_gallery') || '[]');
            images.push({ url, messageId });
            localStorage.setItem('hridoy_gallery', JSON.stringify(images));
        }

        function displayImage(url, messageId, isNew = false) {
            const card = document.createElement('div');
            card.className = 'glass p-4 rounded-[30px] relative group overflow-hidden';
            card.setAttribute('data-id', messageId);
            
            card.innerHTML = `
                <img src="${url}" class="rounded-[20px] w-full h-64 object-cover">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <button onclick="deleteImage('${messageId}')" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-xl font-bold transition-all transform translate-y-4 group-hover:translate-y-0">
                        Delete Forever
                    </button>
                </div>
            `;
            
            if (isNew) {
                galleryGrid.insertBefore(card, galleryGrid.firstChild);
            } else {
                galleryGrid.appendChild(card);
            }
        }

        async function deleteImage(messageId) {
            if(!confirm("Are you sure? This will delete the photo from Telegram too.")) return;

            try {
                // ১. টেলিগ্রাম সার্ভার থেকে ডিলিট
                const response = await fetch(`https://api.telegram.org/bot${botToken}/deleteMessage?chat_id=${chatId}&message_id=${messageId}`);
                const data = await response.json();

                // ২. লোকাল এবং UI থেকে ডিলিট (টেলিগ্রাম থেকে ডিলিট না হলেও লিস্ট থেকে সরাবে)
                let images = JSON.parse(localStorage.getItem('hridoy_gallery') || '[]');
                images = images.filter(img => img.messageId != messageId);
                localStorage.setItem('hridoy_gallery', JSON.stringify(images));

                const element = document.querySelector(`[data-id="${messageId}"]`);
                if(element) element.remove();
                
                if(data.ok) {
                    alert("Deleted successfully from Cloud!");
                } else {
                    alert("Removed from gallery list.");
                }
            } catch (error) {
                console.error("Error deleting:", error);
            }
        }
    </script>
</body>
</html>
