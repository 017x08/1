<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Unlim Cloud</title>
    <style>
        :root { --accent: #2481cc; --bg: #0b0e11; --card: #17212b; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Premium Header */
        header { 
            position: sticky; top: 0; background: rgba(23, 33, 43, 0.95); 
            backdrop-filter: blur(15px); padding: 15px; text-align: center;
            border-bottom: 1px solid #2b3948; z-index: 100;
        }

        /* 3-Column Gallery */
        .gallery {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px;
        }

        .media-item { 
            aspect-ratio: 1/1; background: var(--card); overflow: hidden; position: relative; 
            display: flex; align-items: center; justify-content: center;
        }

        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #17212b; padding: 8px 15px; border-radius: 30px;
            display: flex; gap: 10px; border: 1px solid #2b3948; z-index: 200;
        }

        .nav-btn { color: #808b99; cursor: pointer; padding: 10px 20px; border-radius: 25px; font-size: 13px; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; font-weight: bold; }

        /* Upload FAB */
        .fab {
            position: fixed; bottom: 85px; right: 20px; width: 55px; height: 55px;
            background: var(--accent); border-radius: 50%; border: none;
            color: white; font-size: 30px; cursor: pointer; z-index: 200;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #status { text-align: center; padding: 20px; font-size: 14px; color: var(--accent); }
    </style>
</head>
<body>

<header><h1 style="font-size: 18px; margin: 0;">My Unlimited Cloud</h1></header>

<div id="status">বোট থেকে ডাটা আনা হচ্ছে...</div>
<div class="gallery" id="galleryGrid"></div>

<button class="fab" onclick="document.getElementById('fileInput').click()">+</button>
<input type="file" id="fileInput" style="display: none;" onchange="uploadFile(this.files)">

<div class="nav-bar">
    <div class="nav-btn active" id="tab-all" onclick="refresh('all')">All</div>
    <div class="nav-btn" id="tab-photo" onclick="refresh('photo')">Photos</div>
    <div class="nav-btn" id="tab-video" onclick="refresh('video')">Videos</div>
</div>

<script>
    // আপনার দেওয়া তথ্য
    const TOKEN = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
    const CHAT_ID = '8782276212';

    let mediaCache = [];

    // ১. টেলিগ্রাম থেকে ডাটা আনা
    async function loadMedia() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-50`);
            const data = await res.json();
            
            mediaCache = [];
            const messages = data.result;

            for (let m of messages) {
                const msg = m.message || m.channel_post;
                if (!msg) continue;

                let item = null;
                if (msg.photo) {
                    const fileId = msg.photo[msg.photo.length - 1].file_id;
                    item = { type: 'photo', fileId };
                } else if (msg.video) {
                    item = { type: 'video', fileId: msg.video.file_id };
                }

                if (item) mediaCache.push(item);
            }
            render('all');
            document.getElementById('status').style.display = 'none';
        } catch (e) {
            document.getElementById('status').innerText = "বোট কানেকশন এরর!";
        }
    }

    // ২. ফাইল আইডি থেকে লিঙ্ক তৈরি করে দেখানো
    async function render(filter) {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        // বাটন স্টাইল আপডেট
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + filter).classList.add('active');

        // উল্টো করে দেখানো (নতুন ছবি আগে)
        const filtered = filter === 'all' ? mediaCache : mediaCache.filter(m => m.type === filter);
        
        for (let m of filtered.reverse()) {
            const fileRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${m.fileId}`);
            const fileData = await fileRes.json();
            const url = `https://api.telegram.org/file/bot${TOKEN}/${fileData.result.file_path}`;

            const div = document.createElement('div');
            div.className = 'media-item';
            if (m.type === 'photo') {
                div.innerHTML = `<img src="${url}" onclick="window.open('${url}')">`;
            } else {
                div.innerHTML = `<video src="${url}" onclick="this.play()"></video>`;
            }
            grid.appendChild(div);
        }
    }

    // ৩. রিফ্রেশ ফাংশন
    function refresh(type) {
        render(type);
    }

    // ৪. ওয়েবসাইট থেকে আপলোড (সরাসরি আপনার টেলিগ্রামে যাবে)
    async function uploadFile(files) {
        const file = files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        
        let apiMethod = file.type.startsWith('video') ? 'sendVideo' : 'sendPhoto';
        formData.append(file.type.startsWith('video') ? 'video' : 'photo', file);

        document.getElementById('status').innerText = "টেলিগ্রামে আপলোড হচ্ছে...";
        document.getElementById('status').style.display = 'block';

        await fetch(`https://api.telegram.org/bot${TOKEN}/${apiMethod}`, {
            method: 'POST',
            body: formData
        });
        
        alert("আপলোড সফল! ২-৩ সেকেন্ড পর ডাটা আপডেট হবে।");
        loadMedia();
    }

    // পেজ লোড হলে কল হবে
    loadMedia();
</script>
</body>
</html>
