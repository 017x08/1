<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S SMART GALLERY</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --danger: #ff4757;
        }

        body { 
            background: var(--bg); color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            padding-bottom: 50px; 
        }
        
        header { 
            position: sticky; top: 0; background: rgba(10, 15, 25, 0.8); 
            backdrop-filter: blur(15px); padding: 15px; text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000; 
        }

        header h1 { font-size: 18px; margin: 0; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .admin-area { text-align: center; padding: 20px; }
        
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 5px; }

        .media-item { 
            aspect-ratio: 1/1; background: var(--card-bg); 
            border-radius: 5px; overflow: hidden; position: relative; 
            border: 0.5px solid rgba(255,255,255,0.1); 
        }
        
        .media-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ডিলিট বিন আইকন */
        .trash-btn {
            position: absolute; top: 5px; right: 5px;
            width: 25px; height: 25px; background: var(--danger);
            border-radius: 4px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 10;
        }

        .trash-btn svg { width: 15px; height: 15px; fill: white; }

        .btn-upload { 
            background: var(--accent); color: #000; 
            padding: 12px 25px; border-radius: 25px; 
            border: none; font-weight: bold; cursor: pointer; 
            font-size: 15px; 
        }

        #status { text-align: center; font-size: 12px; color: var(--accent); padding: 10px; }
    </style>
</head>
<body>

<header><h1>HRIDOY'S GALLERY</h1></header>

<div class="admin-area">
    <button id="upload_widget" class="btn-upload">📷 ছবি আপলোড করুন</button>
</div>

<div id="status">Syncing with Media Library...</div>
<div class="gallery" id="galleryGrid"></div>

<!-- Cloudinary Widget Script -->
<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

<script>
    const CLOUD_NAME = 'dkkeyaglx'; 
    const TAG_NAME = 'my_gallery'; 
    const UPLOAD_PRESET = 'my_preset'; 

    // ১. গ্যালারি লোড করার ফাংশন
    async function loadGallery() {
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json?cb=${Date.now()}`);
            const data = await res.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            data.resources.forEach(img => {
                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_500,c_fill,q_auto/${img.public_id}.${img.format}`;
                
                const card = document.createElement('div');
                card.className = 'media-item';
                card.innerHTML = `
                    <div class="trash-btn" onclick="goToDelete('${img.public_id}')">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </div>
                    <img src="${thumbUrl}">
                `;
                grid.appendChild(card);
            });
            document.getElementById('status').innerText = "";
        } catch (e) { document.getElementById('status').innerText = "Load Error!"; }
    }

    // ২. ডিলিট বাটন ক্লিক করলে যা হবে
    function goToDelete(publicId) {
        if(confirm("এই ছবিটি কি Cloudinary Media Library থেকে চিরতরে মুছে ফেলতে চান?")) {
            // এটি আপনাকে সরাসরি ক্লাউডিনারি ড্যাশবোর্ডে নিয়ে যাবে যেখানে ওই ছবিটির আইডি সার্চ করা থাকবে
            const url = `https://cloudinary.com/console/media_library/folders/all?q=${publicId}`;
            window.open(url, '_blank');
        }
    }

    // ৩. আপলোড উইজেট কনফিগারেশন
    var myWidget = cloudinary.createUploadWidget({
        cloudName: CLOUD_NAME, 
        uploadPreset: UPLOAD_PRESET,
        tags: [TAG_NAME]
    }, (error, result) => { 
        if (!error && result.event === "success") {
            setTimeout(loadGallery, 1500); // আপলোড শেষে গ্যালারি রিফ্রেশ হবে
        }
    });

    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

    // প্রথমবার লোড
    loadGallery();
</script>
</body>
</html>
