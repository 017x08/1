<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer | It's Hridoy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --light: #f8fafc;
            --accent: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid #1e293b;
        }

        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; line-height: 1.2; }
        .hero h1 span { color: var(--primary); }
        .hero p { color: #94a3b8; font-size: 1.1rem; }

        /* Upload Box */
        .upload-container {
            border: 2px dashed #4b5563;
            padding: 50px 20px;
            border-radius: 20px;
            margin: 40px auto;
            max-width: 500px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1e293b;
        }

        .upload-container:hover {
            border-color: var(--primary);
            background: #232f44;
            transform: translateY(-5px);
        }

        .upload-container i { font-size: 4rem; color: var(--primary); margin-bottom: 15px; }
        .upload-container p { font-weight: 500; }
        .upload-container span { text-decoration: underline; color: var(--primary); }

        #fileElem { display: none; }

        /* Comparison Slider */
        .preview-section {
            margin-top: 50px;
            animation: fadeIn 0.5s ease-in;
        }

        .comparison-slider {
            position: relative;
            width: 100%;
            max-width: 700px;
            height: 450px;
            margin: 0 auto 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        .image-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; left: 0; top: 0; }
        
        .image-after-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 4px solid white;
            z-index: 2;
        }

        .slider-input {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            margin: 0;
            z-index: 10;
            cursor: ew-resize;
            top: 0;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-enhance { background: var(--primary); color: white; }
        .btn-download { background: var(--accent); color: white; }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .comparison-slider { height: 300px; }
            .hero h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Enhance<span>AI</span></div>
        <div class="user-id">It's Hridoy</div>
    </header>

    <main>
        <section class="hero">
            <h1>পুরানো বা ঝাপসা ছবিকে করুন <br><span>স্মার্টলি এনহ্যান্স</span></h1>
            <p>AI দিয়ে আপনার ছবির ডিটেইলস এবং শার্পনেস ফিরিয়ে আনুন।</p>
            
            <div class="upload-container" id="drop-area">
                <i class="fas fa-file-image"></i>
                <p>ছবি ড্র্যাগ করুন অথবা এখানে <span>ক্লিক করুন</span></p>
                <input type="file" id="fileElem" accept="image/*" onchange="handleFiles(this.files)">
            </div>
        </section>

        <!-- Preview Section -->
        <section class="preview-section" id="preview-section" style="display:none;">
            <div class="comparison-slider">
                <div class="image-container">
                    <!-- Original Image (Right side) -->
                    <img class="image-before" src="" alt="After Enhancement">
                    
                    <!-- Overlay Image (Left side) -->
                    <div class="image-after-overlay" id="overlay">
                         <img class="image-after" src="" alt="Before Enhancement" id="img-after-el">
                    </div>
                </div>
                <!-- Control Slider -->
                <input type="range" min="0" max="100" value="50" class="slider-input" id="compare-slider">
            </div>
            
            <div class="actions">
                <button class="btn btn-enhance" onclick="simulateEnhance()"><i class="fas fa-wand-magic-sparkles"></i> Enhance Now</button>
                <button class="btn btn-download" onclick="alert('Downloading...')"><i class="fas fa-download"></i> Download Image</button>
            </div>
        </section>
    </main>

    <script>
        const slider = document.getElementById('compare-slider');
        const overlay = document.getElementById('overlay');
        const previewSection = document.getElementById('preview-section');
        const imgBefore = document.querySelector('.image-before');
        const imgAfter = document.querySelector('.image-after');
        const imgAfterEl = document.getElementById('img-after-el');

        // স্লাইডার মুভ করার লজিক
        slider.addEventListener('input', (e) => {
            const value = e.target.value;
            overlay.style.width = `${value}%`;
        });

        // ইমেজ আপলোড হ্যান্ডলার
        function handleFiles(files) {
            const file = files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgBefore.src = e.target.result;
                    imgAfter.src = e.target.result;
                    
                    // স্লাইডারে ছবি দেখানোর জন্য কন্টেইনারের সাইজ ঠিক করা
                    imgAfterEl.style.width = document.querySelector('.comparison-slider').offsetWidth + 'px';
                    
                    previewSection.style.display = 'block';
                    previewSection.scrollIntoView({ behavior: 'smooth' });
                }
                reader.readAsDataURL(file);
            }
        }

        // ড্র্যাগ অ্যান্ড ড্রপ সেটিংস
        const dropArea = document.getElementById('drop-area');
        dropArea.onclick = () => document.getElementById('fileElem').click();

        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = "#6366f1";
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.style.borderColor = "#4b5563";
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const dt = e.dataTransfer;
            handleFiles(dt.files);
        });

        // এনহ্যান্স সিমুলেশন (এটি জাস্ট দেখানোর জন্য একটি ফিল্টার অ্যাড করবে)
        function simulateEnhance() {
            imgBefore.style.filter = "contrast(1.2) brightness(1.1) saturate(1.1) sharp(2px)";
            alert("AI Enhancement applied! (Demo Mode)");
        }
    </script>
</body>
</html>
