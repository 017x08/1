<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S SMART GALLERY</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
        }

        body { 
            background: var(--bg); color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; margin: 0; 
            padding-bottom: 50px; 
        }
        
        header { 
            position: sticky; top: 0; background: rgba(10, 15, 25, 0.8); 
            backdrop-filter: blur(15px); padding: 15px; text-align: center; 
            border-bottom: 1px solid var(--glass-border); z-index: 1000; 
        }

        header h1 { font-size: 18px; margin: 0; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .admin-controls { text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px; }

        /* কার্ডের ডিজাইন */
        .media-item { 
            aspect-ratio: 1/1; background: var(--card-bg); 
            border-radius: 8px; overflow: hidden; position: relative; 
            border: 0.5px solid var(--glass-border); 
        }
        
        .media-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* থ্রি ডট বাটন */
        .dot-menu {
            position: absolute; top: 5px; right: 5px;
            width: 25px; height: 25px; background: rgba(0,0,0,0.5);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; color: white;
            z-index: 10; font-weight: bold;
        }

        /* ড্রপডাউন মেনু */
        .dropdown {
            position: absolute; top: 35px; right: 5px;
            background: #1a1c20; border: 1px solid var(--glass-border);
            border-radius: 5px; display: none; z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .dropdown button {
            background: none; border: none; color: var(--danger);
            padding: 8px 15px; font-size: 13px; cursor: pointer; width: 100%;
            text-align: left;
        }

        /* Viewer & Buttons */
        #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        #viewer img { max-width: 95%; max-height: 70%; border-radius: 5px; }

        .btn { padding: 12px 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-upload { background: linear-gradient(45deg, #3a7bd5, #00d2ff); color: white; width: 85%; max-width: 320px; margin-bottom: 10px; }
        .btn-dl { background: var(--accent); color: #000; }
        .btn-close { background: #333; color: #fff; }
        .btn-admin { background: transparent; color: #555; font-size: 11px; margin-top: 10px; }

        #status { text-align: center; font-size: 12px; color: var(--accent); padding: 10px; }
    </style>
</head>
<body>

<header><h1>HRIDOY'S GALLERY</h1></header>

<div class="admin-controls">
    <button id="upload_widget" class="btn btn-upload">📷 ছবি আপলোড করুন</button>
    <button class="btn btn-admin" onclick="adminLogin()">Settings (Admin)</button>
</div>

<div id="status">Syncing...</div>
<div class="gallery" id="galleryGrid"></div>

<!-- Viewer -->
<div id="viewer">
    <div id="viewer-content"></div>
    <div style="margin-top:25px; display: flex; gap: 10px;">
        <button class="btn btn-close" onclick="closeViewer()">বন্ধ করুন</button>
        <button class="btn btn-dl" id="dl-btn" onclick="downloadOriginal()">ডাউনলোড</button>
    </div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

<script>
    const CLOUD_NAME = 'dkkeyaglx'; 
    const TAG_NAME = 'my_gallery'; 
    const UPLOAD_PRESET = 'my_preset'; 
    let currentImageUrl = '';
    let isAdmin = false;

    // ১. অ্যাডমিন লগইন (Pass: 1234)
    function adminLogin() {
        const pass = prompt("পাসওয়ার্ড দিন:");
        if(pass === "1234") {
            isAdmin = true;
            alert("অ্যাডমিন মুড অন হয়েছে! এখন থ্রি-ডট থেকে ডিলিট করতে পারবেন।");
            loadGallery();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    // ২. গ্যালারি লোড
    async function loadGallery() {
        try {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG_NAME}.json?cb=${Date.now()}`);
            const data = await res.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            const hiddenImages = JSON.parse(localStorage.getItem('hiddenImages') || '[]');

            data.resources.forEach(img => {
                if (hiddenImages.includes(img.public_id)) return;

                const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,c_fill,q_auto/${img.public_id}.${img.format}`;
                const originalUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}.${img.format}`;

                const card = document.createElement('div');
                card.className = 'media-item';
                
                // ইমেজ এবং মেনু স্ট্রাকচার
                card.innerHTML = `
                    <div class="dot-menu" onclick="toggleMenu(event, '${img.public_id}')">⋮</div>
                    <div id="drop-${img.public_id}" class="dropdown">
                        <button onclick="hideImage(event, '${img.public_id}')">Delete</button>
                    </div>
                    <img src="${thumbUrl}" onclick="openViewer('${originalUrl}')">
                `;
                grid.appendChild(card);
            });
            document.getElementById('status').innerText = "";
        } catch (e) { document.getElementById('status').innerText = "Load Error!"; }
    }

    // ৩. ড্রপডাউন মেনু টগল
    function toggleMenu(event, id) {
        event.stopPropagation();
        if(!isAdmin) {
            alert("ডিলিট করার জন্য আগে নিচে Settings বাটন থেকে লগইন করুন।");
            return;
        }
        const dropdown = document.getElementById(`drop-${id}`);
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    // ৪. ছবি লুকানো (Delete)
    function hideImage(event, publicId) {
        event.stopPropagation();
        if(confirm("আপনি কি নিশ্চিতভাবে এই ছবিটি মুছতে চান?")) {
            let hiddenImages = JSON.parse(localStorage.getItem('hiddenImages') || '[]');
            hiddenImages.push(publicId);
            localStorage.setItem('hiddenImages', JSON.stringify(hiddenImages));
            loadGallery();
        }
    }

    // উইজেট এবং ভিউয়ার ফাংশন
    var myWidget = cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, tags: [TAG_NAME] }, (error, result) => { if (!error && result.event === "success") loadGallery(); });
    document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

    function openViewer(url) {
        currentImageUrl = url;
        document.getElementById('viewer-content').innerHTML = `<img src="${url}">`;
        document.getElementById('viewer').style.display = 'flex';
    }
    function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

    async function downloadOriginal() {
        if (!currentImageUrl) return;
        try {
            const response = await fetch(currentImageUrl);
            const blob = await response.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `HRIDOY_IMG_${Date.now()}.jpg`;
            a.click();
        } catch (err) { alert("Download failed!"); }
    }

    // স্ক্রিনের কোথাও ক্লিক করলে মেনু বন্ধ হবে
    window.onclick = function() {
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
    }

    loadGallery();
</script>
</body>
</html>
