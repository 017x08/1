<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIDOY'S GALLERY</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; user-select: none; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(15px); padding: 18px; text-align: center; border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        header h1 { font-size: 20px; margin: 0; font-weight: 800; letter-spacing: 1.5px; background: linear-gradient(to right, #00d2ff, #3a7bd5, #00d2ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        
        @keyframes shine { to { background-position: 200% center; } }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }

        .media-item { aspect-ratio: 1/1; background: var(--card-bg); border-radius: 4px; overflow: hidden; position: relative; border: 0.5px solid var(--glass-border); transition: 0.2s; cursor: pointer; }
        .media-item.selected { border: 2px solid var(--accent); transform: scale(0.9); opacity: 0.7; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Video Badge & Duration */
        .video-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0, 0, 0, 0.7); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 3px; }
        .play-icon { font-size: 8px; }

        /* Viewer */
        #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        #viewer-content { width: 100%; height: 70%; display: flex; align-items: center; justify-content: center; }
        #viewer img, #viewer video { max-width: 95%; max-height: 100%; border-radius: 8px; }
        .viewer-tools { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .btn-dl { background: var(--accent); color: #000; }
        .btn-close { background: #333; color: #fff; }

        /* Selection Bar */
        #select-bar { position: fixed; top: 0; left: 0; right: 0; background: var(--accent); color: #000; padding: 15px; display: none; justify-content: space-between; align-items: center; z-index: 2000; font-weight: bold; }

        #status { text-align: center; font-size: 11px; color: var(--accent); padding: 15px; }
    </style>
</head>
<body>

<div id="select-bar">
    <span id="select-count">0 Selected</span>
    <div>
        <button class="btn btn-close" onclick="cancelSelection()">Cancel</button>
        <button class="btn btn-dl" onclick="downloadSelected()">Download</button>
    </div>
</div>

<header><h1>HRIDOY'S GALLERY</h1></header>
<div id="status">Syncing all media...</div>
<div class="gallery" id="galleryGrid"></div>

<div id="viewer">
    <div id="viewer-content"></div>
    <div class="viewer-tools">
        <button class="btn btn-close" onclick="closeViewer()">Close</button>
        <a id="dl-link" download><button class="btn btn-dl">Download</button></a>
    </div>
</div>

<script>
    const TOKEN = '8782276212:AAGRKZdMcmwhydJVVO-uN78bXZMEcV4zlno';
    
    let mediaCache = [];
    let selectedFiles = new Set();
    let isSelectionMode = false;
    let pressTimer;

    // সেকেন্ডকে মিনিট:সেকেন্ড ফরম্যাটে রূপান্তর
    function formatTime(seconds) {
        if (!seconds) return "";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function loadData() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-100`);
            const data = await res.json();
            mediaCache = [];
            
            data.result.forEach(item => {
                const msg = item.message || item.channel_post;
                if (!msg) return;
                
                let entry = null;
                if (msg.photo) {
                    entry = { type: 'photo', fileId: msg.photo[msg.photo.length - 1].file_id };
                } else if (msg.video) {
                    entry = { type: 'video', fileId: msg.video.file_id, duration: msg.video.duration };
                } else if (msg.document) {
                    const mime = msg.document.mime_type || "";
                    if (mime.startsWith('image/')) {
                        entry = { type: 'photo', fileId: msg.document.file_id };
                    } else if (mime.startsWith('video/')) {
                        // ডকুমেন্টের ক্ষেত্রে ডিউরেশন অনেক সময় পাওয়া যায় না, তাই ডিফল্ট ভিডিও ট্যাগ
                        entry = { type: 'video', fileId: msg.document.file_id, duration: null };
                    }
                }
                
                if (entry) mediaCache.push(entry);
            });
            render();
            document.getElementById('status').innerText = "";
        } catch (e) { document.getElementById('status').innerText = "Sync Error"; }
    }

    async function render() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        
        const listToDisplay = [...mediaCache].reverse();
        
        for (let m of listToDisplay) {
            try {
                const fileRes = await fetch(`https://api.telegram.org/bot${TOKEN}/getFile?file_id=${m.fileId}`);
                const fileData = await fileRes.json();
                const url = `https://api.telegram.org/file/bot${TOKEN}/${fileData.result.file_path}`;

                const card = document.createElement('div');
                card.className = 'media-item';
                
                if (m.type === 'photo') {
                    card.innerHTML = `<img src="${url}">`;
                } else {
                    // ভিডিওর জন্য ডিউরেশন এবং আইকন
                    const timeLabel = m.duration ? formatTime(m.duration) : "Video";
                    card.innerHTML = `
                        <video src="${url}"></video>
                        <div class="video-badge">
                            <span class="play-icon">▶</span> ${timeLabel}
                        </div>
                    `;
                }
                
                card.onmousedown = card.ontouchstart = () => { pressTimer = setTimeout(() => startSelection(card, url), 800); };
                card.onmouseup = card.ontouchend = () => clearTimeout(pressTimer);
                
                card.onclick = () => {
                    if (isSelectionMode) toggleSelect(card, url);
                    else openViewer(m.type, url);
                };

                grid.appendChild(card);
            } catch(e) { console.error("File load error"); }
        }
    }

    function openViewer(type, url) {
        const content = document.getElementById('viewer-content');
        content.innerHTML = type === 'photo' ? `<img src="${url}">` : `<video src="${url}" controls autoplay></video>`;
        document.getElementById('dl-link').href = url;
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() { 
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('viewer-content').innerHTML = ''; 
    }

    function startSelection(card, url) {
        isSelectionMode = true;
        document.getElementById('select-bar').style.display = 'flex';
        toggleSelect(card, url);
    }

    function toggleSelect(card, url) {
        if (selectedFiles.has(url)) {
            selectedFiles.delete(url);
            card.classList.remove('selected');
        } else {
            selectedFiles.add(url);
            card.classList.add('selected');
        }
        document.getElementById('select-count').innerText = `${selectedFiles.size} Selected`;
        if (selectedFiles.size === 0) cancelSelection();
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedFiles.clear();
        document.querySelectorAll('.media-item').forEach(i => i.classList.remove('selected'));
        document.getElementById('select-bar').style.display = 'none';
    }

    async function downloadSelected() {
        for (let url of selectedFiles) {
            const a = document.createElement('a');
            a.href = url;
            a.download = "HRIDOY_" + Date.now();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            await new Promise(r => setTimeout(r, 800)); 
        }
        cancelSelection();
    }

    loadData();
</script>
</body>
</html>
