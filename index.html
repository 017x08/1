<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Cloud Manager</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { --tg-blue: #2481cc; --bg: #000; --card: #1c1c1e; }
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; padding-bottom: 120px; 
        }
        
        header { 
            position: sticky; top: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); padding: 18px; text-align: center;
            border-bottom: 0.5px solid #333; z-index: 100;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; padding: 2px;
        }

        .media-card {
            aspect-ratio: 1/1; background: var(--card); position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
        
        /* File Icon for Document Section */
        .file-icon { font-size: 40px; text-align: center; color: #8e8e93; }

        .del-btn {
            position: absolute; top: 5px; right: 5px; background: rgba(231, 76, 60, 0.8);
            border: none; color: white; border-radius: 50%; width: 24px; height: 24px; 
            cursor: pointer; font-size: 14px; font-weight: bold; z-index: 10;
        }

        /* Bottom Nav - Horizontal Style */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            padding: 12px 20px; border-radius: 35px; display: flex; gap: 25px;
            border: 1px solid #333; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item { 
            color: #8e8e93; text-decoration: none; font-size: 13px; cursor: pointer; 
            transition: 0.3s; padding: 5px 12px; border-radius: 20px;
        }
        .nav-item.active { color: #fff; background: var(--tg-blue); font-weight: 600; }

        /* Floating Upload Button */
        .fab-upload {
            position: fixed; bottom: 100px; right: 25px;
            width: 55px; height: 55px; background: var(--tg-blue);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 20px rgba(36, 129, 204, 0.4);
            cursor: pointer; border: none; z-index: 200;
        }
    </style>
</head>
<body>

<header><h1 id="viewTitle">Photos</h1></header>

<div class="gallery-grid" id="mainGallery">
    </div>

<input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(this.files)">

<button class="fab-upload" onclick="document.getElementById('fileInput').click()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
</button>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('photo', this)">Photos</div>
    <div class="nav-item" onclick="switchTab('video', this)">Videos</div>
    <div class="nav-item" onclick="switchTab('file', this)">Files</div>
</div>

<script>
    // ১. Firebase Config (আপনার Firebase এর ডিটেইলস এখানে দিন)
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "your-app.firebaseapp.com",
        databaseURL: "YOUR_DB_URL",
        storageBucket: "YOUR_BUCKET_URL",
        projectId: "your-project-id"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let currentTab = 'photo';

    // ২. Tab Switching Logic (Fix)
    function switchTab(type, el) {
        currentTab = type;
        
        // UI Update
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('viewTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1) + "s";
        
        // Data Reload
        loadData();
    }

    // ৩. Upload Function
    async function handleFileUpload(files) {
        const file = files[0];
        if(!file) return;
        
        const path = `${currentTab}s/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        
        try {
            console.log("Uploading...");
            await ref.put(file);
            const url = await ref.getDownloadURL();
            
            // ডেটাবেসে সেভ
            await db.ref(currentTab).push({
                url: url,
                name: file.name,
                storagePath: path,
                timestamp: Date.now()
            });
            alert("সফলভাবে আপলোড হয়েছে!");
        } catch (e) {
            console.error(e);
            alert("আপলোড ব্যর্থ হয়েছে।");
        }
    }

    // ৪. Load Data (Real-time Sync)
    function loadData() {
        const grid = document.getElementById('mainGallery');
        grid.innerHTML = '<div style="padding:20px;">Loading...</div>';

        db.ref(currentTab).on('value', (snap) => {
            grid.innerHTML = '';
            if (!snap.exists()) {
                grid.innerHTML = '<div style="grid-column: span 3; padding: 50px; text-align: center; color: #555;">No Files Found</div>';
                return;
            }

            snap.forEach(child => {
                const data = child.val();
                const card = document.createElement('div');
                card.className = 'media-card';
                
                // কন্টেন্ট টাইপ অনুযায়ী ভিউ
                if(currentTab === 'photo') {
                    card.innerHTML = `<img src="${data.url}" onclick="window.open('${data.url}')" loading="lazy">`;
                } else if(currentTab === 'video') {
                    card.innerHTML = `<video src="${data.url}" onclick="this.play()"></video>
                                      <div style="position:absolute; bottom:5px; left:5px; font-size:10px; background:rgba(0,0,0,0.5); padding:2px 5px;">▶ Video</div>`;
                } else {
                    card.innerHTML = `<div class="file-icon" onclick="window.open('${data.url}')">📄<br><span style="font-size:10px;">${data.name.substring(0,10)}...</span></div>`;
                }
                
                // ডিলিট বাটন
                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerText = '×';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteItem(child.key, data.storagePath);
                };
                
                card.appendChild(delBtn);
                grid.appendChild(card);
            });
        });
    }

    // ৫. Delete Function
    async function deleteItem(key, path) {
        if(confirm("আপনি কি এটি স্থায়ীভাবে মুছে ফেলতে চান?")) {
            try {
                if(path) {
                    await storage.ref(path).delete();
                }
                await db.ref(currentTab + '/' + key).remove();
            } catch (e) {
                // যদি ফাইল স্টোরেজে না থাকে কিন্তু ডাটাবেসে থাকে, তবে শুধু ডাটাবেস থেকে মুছবে
                await db.ref(currentTab + '/' + key).remove();
            }
        }
    }

    // পেজ লোড হলে কল হবে
    window.onload = loadData;

</script>
</body>
</html>
