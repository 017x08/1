<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Extractor | Free Fire</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Glassmorphism Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: #4facfe; background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }

        #resultArea {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .token-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #4facfe;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>EAT TOKEN EXTRACTOR</h2>
    
    <div class="input-group">
        <label>Username / Email</label>
        <input type="text" id="username" placeholder="Enter FB/Google Email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button onclick="generateToken()" id="btnText">EXTRACT TOKEN</button>

    <div id="resultArea">
        <label>Generated Access Token:</label>
        <div class="token-box" id="tokenOutput"></div>
        <button onclick="copyToken()" style="background: rgba(255,255,255,0.1); font-size: 12px;">COPY TOKEN</button>
    </div>
</div>

<script>
    async function generateToken() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const tokenOutput = document.getElementById('tokenOutput');

        if(!user || !pass) {
            alert("Please fill all fields!");
            return;
        }

        // Loading State
        btn.innerHTML = "PROCESSING...";
        btn.disabled = true;

        // এখানে আপনার ব্যাকেন্ড API কল করতে হবে। 
        // এটি একটি ডামি রেসপন্স সিমুলেশন:
        setTimeout(() => {
            const dummyToken = "EAAAA" + Math.random().toString(36).substring(2, 15).toUpperCase() + "ZB2H";
            
            tokenOutput.innerText = dummyToken;
            resultArea.style.display = "block";
            
            btn.innerHTML = "EXTRACT TOKEN";
            btn.disabled = false;
        }, 2000);
    }

    function copyToken() {
        const token = document.getElementById('tokenOutput').innerText;
        navigator.clipboard.writeText(token);
        alert("Token copied to clipboard!");
    }
</script>

</body>
</html>
