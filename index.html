<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Gallery Pro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent: #0a84ff;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: env(safe-area-inset-top) 15px;
        }

        /* Phone Gallery Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 28px; margin: 0; font-weight: 700; }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* ফোনের গ্যালারির মতো ৩ কলাম */
            gap: 2px;
            margin-top: 10px;
        }

        .photo-item {
            aspect-ratio: 1 / 1;
            background: var(--card-bg);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-item:hover img { transform: scale(1.05); }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: var(--accent);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
            font-size: 24px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .auth-btn {
            background: white;
            color: black;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        #login-screen {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Photos</h1>
        <p>আপনার গুগল ড্রাইভের ফটোগুলো দেখতে সাইন-ইন করুন</p>
        <button class="auth-btn" onclick="handleAuthClick()">Google দিয়ে লগইন করুন</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <h1>Library</h1>
            <button class="auth-btn" style="background: #333; color: white;" onclick="handleSignoutClick()">Logout</button>
        </div>

        <div class="gallery" id="gallery">
            </div>

        <button class="fab" onclick="uploadNew()">+</button>
    </div>

    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
        const API_KEY = 'YOUR_API_KEY';
        const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
        const SCOPES = "https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file";

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        // ১. API লোড করা
        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                gapiInited = true;
                checkBeforeStart();
            });
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // পরে ডিফাইন করা হবে
            });
            gsisInited = true;
            checkBeforeStart();
        }

        function checkBeforeStart() {
            if (gapiInited && gsisInited) {
                // অটো লগইন চেক করা যেতে পারে এখানে
            }
        }

        // ২. অথেন্টিকেশন হ্যান্ডেল
        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                listPhotos();
            };
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        // ৩. ড্রাইভ থেকে ফটো লিস্ট করা
        async function listPhotos() {
            try {
                const response = await gapi.client.drive.files.list({
                    'pageSize': 30,
                    'fields': "files(id, name, thumbnailLink, webContentLink)",
                    'q': "mimeType contains 'image/'"
                });
                const files = response.result.files;
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';

                files.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    // thumbnailLink-এ সাইজ বাড়ানোর জন্য =s220 থেকে =s500 করা যায়
                    const imgUrl = file.thumbnailLink.replace('=s220', '=s500');
                    div.innerHTML = `<img src="${imgUrl}" loading="lazy" onclick="window.open('${file.webContentLink}')">`;
                    gallery.appendChild(div);
                });
            } catch (err) {
                console.error(err);
            }
        }

        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
                location.reload();
            }
        }

        function uploadNew() {
            alert("ফাইল আপলোড করার জন্য Google Picker বা ড্রাইভ API-এর 'create' মেথড ব্যবহার করতে হবে।");
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
