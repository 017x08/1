<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Gallery Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body {
            background: #000; color: #fff; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }
        header {
            position: sticky; top: 0; width: 100%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px); padding: 15px; text-align: center;
            border-bottom: 1px solid #222; z-index: 100;
        }
        .gallery {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; width: 100%; max-width: 600px; padding: 2px;
        }
        .img-card {
            aspect-ratio: 1/1; position: relative; background: #111;
            overflow: hidden; cursor: pointer;
        }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .delete-overlay {
            position: absolute; top: 5px; right: 5px;
            background: rgba(255, 0, 0, 0.7); border-radius: 50%;
            width: 25px; height: 25px; display: flex; align-items: center;
            justify-content: center; font-size: 12px; font-weight: bold;
        }
        .status-bar { font-size: 12px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 20px; margin: 0;">TG Cloud Gallery</h1>
    <div class="status-bar" id="status">বট থেকে ছবি পাঠালে এখানে আসবে</div>
</header>

<div class="gallery" id="imageGrid">
    </div>

<script>
    // ১. Firebase Config (আপনার Firebase থেকে কপি করে এখানে বসান)
    const firebaseConfig = {
        databaseURL: "YOUR_FIREBASE_DATABASE_URL"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ২. ডেটাবেস থেকে ছবি লোড করা
    db.ref('gallery').on('value', (snapshot) => {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = '';
        snapshot.forEach((child) => {
            const data = child.val();
            const card = document.createElement('div');
            card.className = 'img-card';
            card.innerHTML = `
                <img src="${data.url}">
                <div class="delete-overlay" onclick="deleteImg('${child.key}')">X</div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('status').innerText = snapshot.numChildren() + " Photos Synced";
    });

    // ৩. ওয়েবসাইট থেকে ডিলিট করার ফাংশন
    function deleteImg(id) {
        if(confirm("এটি গ্যালারি থেকে মুছে ফেলতে চান?")) {
            db.ref('gallery/' + id).remove();
        }
    }
</script>
</body>
</html>
